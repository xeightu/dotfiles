# ┌─── 1. Path Definitions ────────────────────────────────────────────────────┐

$BIN      = ~/.local/bin
$DESKTOP  = $BIN/desktop
$ACTIONS  = $BIN/actions
$SHOTS    = $BIN/screenshots
$CLICKERS = $ACTIONS/clicker


# ┌─── 2. Application & Modifier Aliases ──────────────────────────────────────┐

$MAIN_MOD = SUPER

$TERM     = kitty
$FILES    = kitty -e yazi
$BROWSER  = zen-browser
$MENU     = rofi -show drun -sidebar-mode
$EDITOR   = nvim

# [FIX] Class 'float_app' is required for Hyprland window rules to trigger float
$FLOAT_TERM = kitty --class float_app -e
$SYS_MENU   = kitty --class kitty-maintenance -e $DESKTOP/sysmenu.sh

$CLIPBOARD = ~/.config/rofi/rofi-cliphist | rofi -dmenu -l 5 -display-columns 2 -show-icons -p "Clipboard:" -theme-str "window {width: 1000px;} listview {lines: 5; fixed-height: true;} element {children: [element-icon, element-text];} element-icon {size: 3ch;}" | cliphist decode | wl-copy
$CALC      = rofi -show calc -modi calc -no-show-match -no-sort -theme-str "window {width: 600px;} listview {lines: 5;} element {children: [\"element-text\"];} element-text {horizontal-align: 0; expand: true;} mode-switcher {enabled: false;}"
$EMOJI     = rofi -show emoji -modi emoji -theme-str "window {width: 800px;} listview {lines: 10;} element {children: [\"element-text\"];} element-text {horizontal-align: 0; expand: true;} mode-switcher {enabled: false;}"

$PYRE        = $BIN/pyre
$THEME_SEL   = $PYRE theme
$WALL_SEL    = $PYRE wallpaper select
$LAYOUT_SEL  = $PYRE layout
$SYS_RELOAD  = $PYRE reload


# ┌─── 3. System & Media Commands ─────────────────────────────────────────────┐

$POWER_MENU  = $ACTIONS/powermenu.sh
$TOGGLE_BAR  = $ACTIONS/waybar_toggle.sh
$LOCK_SCREEN = hyprlock
$RELOAD_CONF = hyprctl reload

$VOL_UP      = wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
$VOL_DOWN    = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
$VOL_MUTE    = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
$MIC_MUTE    = $ACTIONS/mic_toggle.sh

$BRIGHT_UP   = $ACTIONS/brightness.sh +
$BRIGHT_DOWN = $ACTIONS/brightness.sh -

$SHOT_AREA   = $SHOTS/area.sh
$SHOT_FAST   = hyprshot -m region --clipboard-only --freeze --silent && notify-send -t 2000 "Action" "Copied to clipboard"
$SHOT_WIN    = $SHOTS/window.sh
$SHOT_OCR    = $SHOTS/ocr.sh

# [WARN] Requires ydotool daemon to be running
$AUTOCLICK_L   = $CLICKERS/mouse.sh left
$AUTOCLICK_ALL = $CLICKERS/clicker.sh
$BOUNCE        = $ACTIONS/cursor_bounce.sh
$SPLIT_SW      = $ACTIONS/split_switch.sh


# ┌─── 4. Applications & Tools ────────────────────────────────────────────────┐

bind = $MAIN_MOD, Return,    exec, $TERM
bind = $MAIN_MOD, E,         exec, $FILES
bind = $MAIN_MOD, B,         exec, $BROWSER
bind = $MAIN_MOD, D,         exec, $MENU

bind = $MAIN_MOD, C,         exec, $CALC
bind = $MAIN_MOD, period,    exec, $EMOJI
bind = $MAIN_MOD, V,         exec, $CLIPBOARD
bind = $MAIN_MOD, SPACE,     exec, $PYRE
bind = $MAIN_MOD, W,         exec, $WALL_SEL
bind = $MAIN_MOD, T,         exec, dialect
bind = $MAIN_MOD, U,         exec, $SYS_MENU
bind = CTRL SHIFT, ESCAPE,   exec, kitty btop
bind = $MAIN_MOD, P,         exec, hyprpicker


# ┌─── 5. Window Management ───────────────────────────────────────────────────┐

bind = $MAIN_MOD, Q,         killactive
bind = $MAIN_MOD, F,         togglefloating
bind = $MAIN_MOD SHIFT, V,   fullscreen

# Layout switching
bind = $MAIN_MOD, M,         exec, hyprctl keyword general:layout master
bind = $MAIN_MOD SHIFT, M,   exec, hyprctl keyword general:layout dwindle
bind = $MAIN_MOD CTRL, M,    exec, hyprctl keyword general:layout scrolling
bind = $MAIN_MOD, I,         layoutmsg, addmaster
bind = $MAIN_MOD SHIFT, SPACE,     layoutmsg, swapwithmaster
bind = $MAIN_MOD, O,         exec, $SPLIT_SW

# Tabbed groups
bind = $MAIN_MOD, G,         togglegroup
bind = $MAIN_MOD, Tab,       changegroupactive, f
bind = $MAIN_MOD SHIFT, Tab, changegroupactive, b


# ┌─── 6. Focus & Movement ────────────────────────────────────────────────────┐

# Vim-style focus
bind = $MAIN_MOD, H, movefocus, l
bind = $MAIN_MOD, L, movefocus, r
bind = $MAIN_MOD, K, movefocus, u
bind = $MAIN_MOD, J, movefocus, d

# Window relocation
bind = $MAIN_MOD SHIFT, H, movewindow, l
bind = $MAIN_MOD SHIFT, L, movewindow, r
bind = $MAIN_MOD SHIFT, K, movewindow, u
bind = $MAIN_MOD SHIFT, J, movewindow, d

# Resize Submap
bind = $MAIN_MOD, R, submap, resize
submap = resize
    binde = , H, resizeactive, -20 0
    binde = , L, resizeactive,  20 0
    binde = , K, resizeactive,   0 -20
    binde = , J, resizeactive,   0 20
    bind  = , Escape, submap, reset 
submap = reset


# ┌─── 7. Workspace Management ────────────────────────────────────────────────┐

# Direct switching
bind = $MAIN_MOD, 1, workspace, 1
bind = $MAIN_MOD, 2, workspace, 2
bind = $MAIN_MOD, 3, workspace, 3
bind = $MAIN_MOD, 4, workspace, 4
bind = $MAIN_MOD, 5, workspace, 5
bind = $MAIN_MOD, 6, workspace, 6
bind = $MAIN_MOD, 7, workspace, 7
bind = $MAIN_MOD, 8, workspace, 8
bind = $MAIN_MOD, 9, workspace, 9
bind = $MAIN_MOD, 0, workspace, 10

# Migration
bind = $MAIN_MOD SHIFT, 1, movetoworkspace, 1
bind = $MAIN_MOD SHIFT, 2, movetoworkspace, 2
bind = $MAIN_MOD SHIFT, 3, movetoworkspace, 3
bind = $MAIN_MOD SHIFT, 4, movetoworkspace, 4
bind = $MAIN_MOD SHIFT, 5, movetoworkspace, 5
bind = $MAIN_MOD SHIFT, 6, movetoworkspace, 6
bind = $MAIN_MOD SHIFT, 7, movetoworkspace, 7
bind = $MAIN_MOD SHIFT, 8, movetoworkspace, 8
bind = $MAIN_MOD SHIFT, 9, movetoworkspace, 9
bind = $MAIN_MOD SHIFT, 0, movetoworkspace, 10

# [NOTE] Special workspace (scratchpad) for background tasks
bind = $MAIN_MOD, S,       togglespecialworkspace,
bind = $MAIN_MOD SHIFT, S, movetoworkspace, special

# Mouse wheel cycling
bind = $MAIN_MOD,       mouse_down, workspace, +1
bind = $MAIN_MOD,       mouse_up,   workspace, -1
bind = $MAIN_MOD SHIFT, mouse_down, movetoworkspace, +1
bind = $MAIN_MOD SHIFT, mouse_up,   movetoworkspace, -1


# ┌─── 8. System & Utility Bindings ───────────────────────────────────────────┐

# [WARN] SHIFT+E triggers immediate logout
bind = $MAIN_MOD SHIFT, E, exit
bind = $MAIN_MOD SHIFT, R, exec, $RELOAD_CONF
bind = $MAIN_MOD,       X, exec, $POWER_MENU
bind = $MAIN_MOD SHIFT, X, exec, $LOCK_SCREEN
bind = $MAIN_MOD SHIFT, W, exec, $TOGGLE_BAR

# Screenshots
bind = ,          Print, exec, $SHOT_AREA
bind = SHIFT,     Print, exec, $SHOT_FAST
bind = CTRL,      Print, exec, $SHOT_WIN
bind = $MAIN_MOD, Print, exec, $SHOT_OCR

# Notifications
bind = $MAIN_MOD,       GRAVE, exec, makoctl dismiss
bind = $MAIN_MOD CTRL,  GRAVE, exec, makoctl dismiss -a
bind = $MAIN_MOD SHIFT, GRAVE, exec, makoctl restore
bind = $MAIN_MOD ALT,   GRAVE, exec, makoctl mode -t dnd && pkill -RTMIN+11 waybar

# [NOTE] Inject Ukrainian characters via wtype for standard US layouts
bind = ALT, COMMA,  exec, wtype є
bind = ALT, PERIOD, exec, wtype і
bind = ALT, SLASH,  exec, wtype ї

bind = ALT CTRL, COMMA,  exec, wtype Є
bind = ALT CTRL, PERIOD, exec, wtype І
bind = ALT CTRL, SLASH,  exec, wtype Ї


# ┌─── 9. Hardware & Media Controls ───────────────────────────────────────────┐

# bindel enables repeat when key is held
bindel = , XF86AudioRaiseVolume, exec, $VOL_UP
bindel = , XF86AudioLowerVolume, exec, $VOL_DOWN
bindel = , XF86AudioMute,        exec, $VOL_MUTE
bindel = , XF86AudioMicMute,     exec, $MIC_MUTE

bind = , XF86AudioNext,  exec, playerctl next
bind = , XF86AudioPrev,  exec, playerctl previous
bind = , XF86AudioPlay,  exec, playerctl play-pause

bindel = , XF86MonBrightnessUp,   exec, $BRIGHT_UP
bindel = , XF86MonBrightnessDown, exec, $BRIGHT_DOWN

# Automation toggles
bind = , F7, exec, $AUTOCLICK_L
bind = , F8, exec, $AUTOCLICK_ALL
bind = , F9, exec, $BOUNCE

# Touchpad/Gesture emulation
bind = SUPER_ALT, left,  workspace, -1
bind = SUPER_ALT, right, workspace, +1
bind = SUPER_ALT, up,    exec, $MENU
bind = SUPER_ALT, down,  killactive


# ┌─── 10. Mouse Bindings ─────────────────────────────────────────────────────┐

bindm = $MAIN_MOD, mouse:272, movewindow
bindm = $MAIN_MOD, mouse:273, resizewindow
