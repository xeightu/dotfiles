# ┌─── Keybindings ────────────────────────────────────────────────────────────┐
# │  [INFO] Configuration of keyboard shortcuts and input actions.             │
# │  [NOTE] Complex commands are aliased at the top for table cleanliness.     │
# └────────────────────────────────────────────────────────────────────────────┘


# ┌─── Command Aliases ────────────────────────────────────────────────────────┐

# ┌─── 1. Path Definitions ────────────────────────────────────────────────────┐
# [INFO] Define base paths to avoid repetition and make refactoring easier.

$bin      = ~/.local/bin
$desktop  = $bin/desktop
$actions  = $bin/actions
$shots    = $bin/screenshots
$clickers = $actions/clicker

# ┌─── 2. Applications ────────────────────────────────────────────────────────┐

$term     = kitty
$files    = thunar
$browser  = zen-browser
$menu     = wofi
$editor   = nvim

# ┌─── 3. Widgets & TUI Tools ─────────────────────────────────────────────────┐
# [CONFIG] Wrapper for floating TUI apps (requires window rules for 'float_app')
$floatTerm  = kitty --class float_app -e

$calc       = wofi-calc
$emoji      = wofi-emoji
$clipboard  = kitty --class clipse -e clipse
$wallpicker = $bin/pyre wallpaper select
$pyre       = $bin/pyre

# ┌─── 4. System Scripts ──────────────────────────────────────────────────────┐

# [UPDATE] Moved to $core (lifecycle) or $actions (toggles)
$sysMenu    = kitty --class kitty-maintenance -e $desktop/sysmenu.sh
$powerMenu  = $actions/powermenu.sh
$toggleBar  = $actions/waybar_toggle.sh
$lockScreen = hyprlock
$reloadConf = hyprctl reload

# ┌─── 5. Media & Hardware ────────────────────────────────────────────────────┐

# Audio (Wireplumber)
$volUp      = wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
$volDown    = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
$volMute    = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
$micMute    = $actions/mic_toggle.sh

# Brightness
$brightUp   = $actions/brightness.sh +
$brightDown = $actions/brightness.sh -

# Screenshots (Paths unchanged)
$shotArea   = $shots/area.sh
$shotWin    = $shots/window.sh
$shotOcr    = $shots/ocr.sh

# ┌─── 6. Utils & Clickers ────────────────────────────────────────────────────┐

# [NOTE] Updated to use the new universal mouse.sh wrapper
$autoclickL   = $clickers/mouse.sh left
$autoclickALL = $clickers/clicker.sh

# Mouse FX
$bounce       = $actions/cursor_bounce.sh
$splitSw      = $actions/split_switch.sh


# ┌─── Applications & Tools ───────────────────────────────────────────────────┐

# --- Essential ---
bind = $mainMod, Return,    exec, $term                 # Terminal
bind = $mainMod, E,         exec, $files                # File Manager
bind = $mainMod, B,         exec, $browser              # Web Browser
bind = $mainMod, D,         exec, $menu                 # App Launcher

# --- Utilities ---
bind = $mainMod, C,         exec, $calc                 # Calculator
bind = $mainMod, period,    exec, $emoji                # Emoji Picker
bind = $mainMod, V,         exec, $clipboard            # Clipboard History
bind = $mainMod, SPACE,     exec, $pyre                 # Pyre Engine
bind = $mainMod, W,         exec, $wallpicker           # Wallpaper Picker
bind = $mainMod, T,         exec, dialect               # Translator
bind = $mainMod, U,         exec, $sysMenu              # Maintenance Menu
bind = CTRL SHIFT, ESCAPE,  exec, kitty btop            # System Monitor



# ┌─── Window Management ──────────────────────────────────────────────────────┐

# --- General ---
bind = $mainMod, Q,         killactive,                 # Close Window
bind = $mainMod, F,         togglefloating,             # Toggle Floating
bind = $mainMod SHIFT, V,   fullscreen,                 # Toggle Fullscreen

# --- Layout Control ---
bind = $mainMod, M,         exec, hyprctl keyword general:layout master
bind = $mainMod SHIFT, M,   exec, hyprctl keyword general:layout dwindle
bind = $mainMod, I,         layoutmsg, addmaster        # Set as Master
bind = $mainMod, Space,     layoutmsg, swapwithmaster   # Swap with Master
bind = $mainMod, O,         exec, $splitSw              # Toggle Split

# --- Grouping ---
bind = $mainMod, G,         togglegroup                 # Toggle Group
bind = $mainMod, Tab,       changegroupactive, f        # Next Tab
bind = $mainMod SHIFT, Tab, changegroupactive, b        # Prev Tab


# ┌─── Focus & Movement ───────────────────────────────────────────────────────┐

# --- Move Focus (Vim) ---
bind = $mainMod, H,         movefocus, l
bind = $mainMod, L,         movefocus, r
bind = $mainMod, K,         movefocus, u
bind = $mainMod, J,         movefocus, d

# --- Move Window (Vim) ---
bind = $mainMod SHIFT, H,   movewindow, l
bind = $mainMod SHIFT, L,   movewindow, r
bind = $mainMod SHIFT, K,   movewindow, u
bind = $mainMod SHIFT, J,   movewindow, d

# --- Resize Submap ---
bind = $mainMod, R, submap, resize
submap = resize
    binde = , H, resizeactive, -20 0
    binde = , L, resizeactive,  20 0
    binde = , K, resizeactive,   0 -20
    binde = , J, resizeactive,   0 20
    bind  = , Escape, submap, reset 
submap = reset


# ┌─── Workspace Management ───────────────────────────────────────────────────┐

# --- Switching ---
bind = $mainMod, 1,         workspace, 1
bind = $mainMod, 2,         workspace, 2
bind = $mainMod, 3,         workspace, 3
bind = $mainMod, 4,         workspace, 4
bind = $mainMod, 5,         workspace, 5
bind = $mainMod, 6,         workspace, 6
bind = $mainMod, 7,         workspace, 7
bind = $mainMod, 8,         workspace, 8
bind = $mainMod, 9,         workspace, 9
bind = $mainMod, 0,         workspace, 10

# --- Moving Windows ---
bind = $mainMod SHIFT, 1,   movetoworkspace, 1
bind = $mainMod SHIFT, 2,   movetoworkspace, 2
bind = $mainMod SHIFT, 3,   movetoworkspace, 3
bind = $mainMod SHIFT, 4,   movetoworkspace, 4
bind = $mainMod SHIFT, 5,   movetoworkspace, 5
bind = $mainMod SHIFT, 6,   movetoworkspace, 6
bind = $mainMod SHIFT, 7,   movetoworkspace, 7
bind = $mainMod SHIFT, 8,   movetoworkspace, 8
bind = $mainMod SHIFT, 9,   movetoworkspace, 9
bind = $mainMod SHIFT, 0,   movetoworkspace, 10

# --- Scratchpad ---
bind = $mainMod, S,         togglespecialworkspace,     # Toggle Overlay
bind = $mainMod SHIFT, S,   movetoworkspace, special    # Move to Overlay

# --- Mouse Scroll ---
bind = $mainMod,       mouse_down, workspace, +1
bind = $mainMod,       mouse_up,   workspace, -1
bind = $mainMod SHIFT, mouse_down, movetoworkspace, +1
bind = $mainMod SHIFT, mouse_up,   movetoworkspace, -1


# ┌─── System Actions ─────────────────────────────────────────────────────────┐

# --- Session ---
bind = $mainMod SHIFT, E,   exit,                       # Kill Session
bind = $mainMod SHIFT, R,   exec, $reloadConf           # Reload Config
bind = $mainMod SHIFT, X,   exec, $lockScreen           # Lock Screen
bind = $mainMod, X,         exec, $powerMenu            # Power Menu
bind = $mainMod SHIFT, W,   exec, $toggleBar            # Toggle Bar

# --- Screenshots ---
bind = ,       Print,       exec, $shotArea             # Area Shot
bind = CTRL,   Print,       exec, $shotWin              # Window Shot
bind = $mainMod, Print,     exec, $shotOcr              # Text Recognition

# --- Notifications ---
bind = $mainMod,       GRAVE, exec, dunstctl close
bind = $mainMod SHIFT, GRAVE, exec, dunstctl history-pop
bind = $mainMod CTRL,  GRAVE, exec, dunstctl close-all


# ┌─── Hardware & Media ───────────────────────────────────────────────────────┐

# --- Volume & Mic ---
bindel = , XF86AudioRaiseVolume,  exec, $volUp
bindel = , XF86AudioLowerVolume,  exec, $volDown
bindel = , XF86AudioMute,         exec, $volMute
bindel = , XF86AudioMicMute,      exec, $micMute

# --- Playback ---
bind = , XF86AudioNext,     exec, playerctl next
bind = , XF86AudioPrev,     exec, playerctl previous
bind = , XF86AudioPlay,     exec, playerctl play-pause

# --- Brightness ---
bindel = , XF86MonBrightnessUp,   exec, $brightUp
bindel = , XF86MonBrightnessDown, exec, $brightDown

# --- Utils (F-Keys) ---
bind = , F7,    exec, $autoclickL       # Toggle Left Mouse
bind = , F8,    exec, $autoclickALL     # Toggle ALL (L+R+M+Keys)
bind = , F9,    exec, $bounce

# --- Gestures (Ydotool) ---
bind = SUPER_ALT, left,     workspace, -1
bind = SUPER_ALT, right,    workspace, +1
bind = SUPER_ALT, up,       exec, $menu
bind = SUPER_ALT, down,     killactive,


# ┌─── Mouse Bindings ─────────────────────────────────────────────────────────┐

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
