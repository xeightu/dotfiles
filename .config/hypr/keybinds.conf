# ┌─── Keybindings Configuration ──────────────────────────────────────────────┐
# │  [INFO] Input mapping and action logic for the Hyprland compositor.        │
# └────────────────────────────────────────────────────────────────────────────┘


# ┌─── 1. Path Definitions ────────────────────────────────────────────────────┐


# [CFG] Centralized paths to prevent broken references during script migration
$bin      = ~/.local/bin
$desktop  = $bin/desktop
$actions  = $bin/actions
$shots    = $bin/screenshots
$clickers = $actions/clicker


# ┌─── 2. Application & Modifier Aliases ──────────────────────────────────────┐


# [CFG] Default modifier key (Super/Windows key)
$mainMod  = SUPER

# [CFG] Core applications suite
$term     = kitty
$files    = kitty -e yazi
$browser  = zen-browser
$menu     = wofi
$editor   = nvim

# [CFG] TUI wrappers with specific class requirements
# [FIX] 'float_app' class is required for Hyprland window rules to trigger float
$floatTerm  = kitty --class float_app -e
$clipboard  = kitty --class clipse -e clipse
$sysMenu    = kitty --class kitty-maintenance -e $desktop/sysmenu.sh

# [CFG] Helper utilities
$calc       = wofi-calc
$emoji      = wofi-emoji
$wallpicker = $bin/pyre wallpaper select
$pyre       = $bin/pyre


# ┌─── 3. System & Media Commands ─────────────────────────────────────────────┐


# [FLOW] Session and state management
$powerMenu  = $actions/powermenu.sh
$toggleBar  = $actions/waybar_toggle.sh
$lockScreen = hyprlock
$reloadConf = hyprctl reload

# [CFG] Audio control (Wireplumber backend)
$volUp      = wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
$volDown    = wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
$volMute    = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
$micMute    = $actions/mic_toggle.sh

# [CFG] Hardware overlays
$brightUp   = $actions/brightness.sh +
$brightDown = $actions/brightness.sh -

# [CFG] Screen capture logic
$shotArea   = $shots/area.sh
$shotWin    = $shots/window.sh
$shotOcr    = $shots/ocr.sh

# [HACK] Input automation (requires ydotool daemon)
$autoclickL   = $clickers/mouse.sh left
$autoclickALL = $clickers/clicker.sh
$bounce       = $actions/cursor_bounce.sh
$splitSw      = $actions/split_switch.sh


# ┌─── 4. Applications & Tools ────────────────────────────────────────────────┐


# [FLOW] Essential productivity spawns
bind = $mainMod, Return,    exec, $term                 # Terminal
bind = $mainMod, E,         exec, $files                # File Manager
bind = $mainMod, B,         exec, $browser              # Web Browser
bind = $mainMod, D,         exec, $menu                 # App Launcher

# [OPT] Quick-access widgets for distraction-free workflow
bind = $mainMod, C,         exec, $calc                 # Calculator
bind = $mainMod, period,    exec, $emoji                # Emoji Picker
bind = $mainMod, V,         exec, $clipboard            # Clipboard history
bind = $mainMod, SPACE,     exec, $pyre                 # Control engine
bind = $mainMod, W,         exec, $wallpicker           # Theme selection
bind = $mainMod, T,         exec, dialect               # Translation
bind = $mainMod, U,         exec, $sysMenu              # System maintenance
bind = CTRL SHIFT, ESCAPE,  exec, kitty btop            # Task manager
bind = $mainMod, P,         exec, hyprpicker            # Color sampler


# ┌─── 5. Window Management ───────────────────────────────────────────────────┐


# [FLOW] Basic window lifecycle
bind = $mainMod, Q,         killactive,                 # Close focused window
bind = $mainMod, F,         togglefloating,             # Toggle floating state
bind = $mainMod SHIFT, V,   fullscreen,                 # Maximize workspace usage

# [FLOW] Layout switching
# [OPT] Master layout for focused work, Dwindle for multitasking
bind = $mainMod, M,         exec, hyprctl keyword general:layout master
bind = $mainMod SHIFT, M,   exec, hyprctl keyword general:layout dwindle
bind = $mainMod, I,         layoutmsg, addmaster
bind = $mainMod, Space,     layoutmsg, swapwithmaster
bind = $mainMod, O,         exec, $splitSw              # Toggle split direction

# [FLOW] Group management (Tabbed windows)
bind = $mainMod, G,         togglegroup                 # Merge windows into tabs
bind = $mainMod, Tab,       changegroupactive, f        # Cycle next tab
bind = $mainMod SHIFT, Tab, changegroupactive, b        # Cycle previous tab


# ┌─── 6. Focus & Movement ────────────────────────────────────────────────────┐


# [FLOW] Vim-style focus navigation
bind = $mainMod, H,         movefocus, l
bind = $mainMod, L,         movefocus, r
bind = $mainMod, K,         movefocus, u
bind = $mainMod, J,         movefocus, d

# [FLOW] Window relocation
bind = $mainMod SHIFT, H,   movewindow, l
bind = $mainMod SHIFT, L,   movewindow, r
bind = $mainMod SHIFT, K,   movewindow, u
bind = $mainMod SHIFT, J,   movewindow, d

# [FLOW] Resize Submap
# [OPT] Using submap to prevent accidental window resizing during fast typing
bind = $mainMod, R, submap, resize
submap = resize
    binde = , H, resizeactive, -20 0
    binde = , L, resizeactive,  20 0
    binde = , K, resizeactive,   0 -20
    binde = , J, resizeactive,   0 20
    bind  = , Escape, submap, reset 
submap = reset


# ┌─── 7. Workspace Management ────────────────────────────────────────────────┐


# [FLOW] Direct workspace switching (1-10)
bind = $mainMod, 1,         workspace, 1
bind = $mainMod, 2,         workspace, 2
bind = $mainMod, 3,         workspace, 3
bind = $mainMod, 4,         workspace, 4
bind = $mainMod, 5,         workspace, 5
bind = $mainMod, 6,         workspace, 6
bind = $mainMod, 7,         workspace, 7
bind = $mainMod, 8,         workspace, 8
bind = $mainMod, 9,         workspace, 9
bind = $mainMod, 0,         workspace, 10

# [FLOW] Window migration to workspaces
bind = $mainMod SHIFT, 1,   movetoworkspace, 1
bind = $mainMod SHIFT, 2,   movetoworkspace, 2
bind = $mainMod SHIFT, 3,   movetoworkspace, 3
bind = $mainMod SHIFT, 4,   movetoworkspace, 4
bind = $mainMod SHIFT, 5,   movetoworkspace, 5
bind = $mainMod SHIFT, 6,   movetoworkspace, 6
bind = $mainMod SHIFT, 7,   movetoworkspace, 7
bind = $mainMod SHIFT, 8,   movetoworkspace, 8
bind = $mainMod SHIFT, 9,   movetoworkspace, 9
bind = $mainMod SHIFT, 0,   movetoworkspace, 10

# [OPT] Scratchpad (Special workspace) for hidden background tasks
bind = $mainMod, S,         togglespecialworkspace,
bind = $mainMod SHIFT, S,   movetoworkspace, special

# [FLOW] Continuous workspace cycling via mouse wheel
bind = $mainMod,       mouse_down, workspace, +1
bind = $mainMod,       mouse_up,   workspace, -1
bind = $mainMod SHIFT, mouse_down, movetoworkspace, +1
bind = $mainMod SHIFT, mouse_up,   movetoworkspace, -1


# ┌─── 8. System & Utility Bindings ───────────────────────────────────────────┐


# [CRIT] Session termination and lock
bind = $mainMod SHIFT, E,   exit,                       # Immediate logout
bind = $mainMod SHIFT, R,   exec, $reloadConf           # Hot-reload compositor
bind = $mainMod SHIFT, X,   exec, $lockScreen           # Security lock
bind = $mainMod, X,         exec, $powerMenu            # Shutdown/Reboot menu
bind = $mainMod SHIFT, W,   exec, $toggleBar            # Refresh UI/Waybar

# [CFG] Media capture (Screenshots)
bind = ,       Print,       exec, $shotArea             # Selective area
bind = CTRL,   Print,       exec, $shotWin              # Active window only
bind = $mainMod, Print,     exec, $shotOcr              # OCR text extraction

# [FLOW] Notification control (Dunst)
bind = $mainMod,       GRAVE, exec, dunstctl close
bind = $mainMod SHIFT, GRAVE, exec, dunstctl history-pop
bind = $mainMod CTRL,  GRAVE, exec, dunstctl close-all

# [FIX] Ukrainian character injection
# [HACK] Manual wtype injection for layouts lacking dedicated keys or for speed
bind = ALT, COMMA,  exec, wtype є
bind = ALT, PERIOD, exec, wtype і
bind = ALT, SLASH,  exec, wtype ї

bind = ALT SHIFT, COMMA,  exec, wtype Є
bind = ALT SHIFT, PERIOD, exec, wtype І
bind = ALT SHIFT, SLASH,  exec, wtype Ї


# ┌─── 9. Hardware & Media Controls ───────────────────────────────────────────┐


# [CFG] Audio/Brightness (bindel for repeat support during hold)
bindel = , XF86AudioRaiseVolume,  exec, $volUp
bindel = , XF86AudioLowerVolume,  exec, $volDown
bindel = , XF86AudioMute,         exec, $volMute
bindel = , XF86AudioMicMute,      exec, $micMute

# [FLOW] Media playback control
bind = , XF86AudioNext,     exec, playerctl next
bind = , XF86AudioPrev,     exec, playerctl previous
bind = , XF86AudioPlay,     exec, playerctl play-pause

# [CFG] Screen backlight
bindel = , XF86MonBrightnessUp,   exec, $brightUp
bindel = , XF86MonBrightnessDown, exec, $brightDown

# [HACK] Automation and FX toggles
bind = , F7,    exec, $autoclickL       # [OPT] Toggle AFK left click
bind = , F8,    exec, $autoclickALL     # [OPT] Full automation script
bind = , F9,    exec, $bounce           # [OPT] Visual cursor feedback

# [FLOW] Touchpad/Gesture emulation via ydotool
bind = SUPER_ALT, left,     workspace, -1
bind = SUPER_ALT, right,    workspace, +1
bind = SUPER_ALT, up,       exec, $menu
bind = SUPER_ALT, down,     killactive,


# ┌─── 10. Mouse Bindings ─────────────────────────────────────────────────────┐


# [FLOW] Interactive window manipulation
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
