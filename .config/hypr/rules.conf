# ┌────────────────────────────────────────────────────────────────────────────┐
# │                         HYPRLAND - WINDOW RULES                            │
# └────────────────────────────────────────────────────────────────────────────┘
# [INFO] Use 'hyprctl clients' to find window class/title.


# ┌─── 1. General Behavior ────────────────────────────────────────────────────┐

# --- Window Events ---
# [RECOMMENDED] Block manual maximize to preserve tiling logic.
windowrulev2 = suppressevent maximize, class:.*

# --- Focus Rules ---
# [FIX] Prevent status bar from stealing focus on launch.
windowrulev2 = noinitialfocus,         class:^(waybar)$


# ┌─── 2. Floating Windows & UI ───────────────────────────────────────────────┐

# --- System UI & Settings ---
# [OPTIMIZATION] Regex grouping for standard dialogs and settings windows.
windowrulev2 = float,  class:^(pavucontrol|org.kde.polkit-kde.*|lxqt-policykit.*|nwg-look|qt6ct|kvantummanager|hyprland-share-picker|hyprland-dialog|rustdesk|org.gnome.FileRoller)$
windowrulev2 = center, class:^(pavucontrol|org.kde.polkit-kde.*|lxqt-policykit.*|nwg-look|qt6ct|kvantummanager|hyprland-share-picker|hyprland-dialog|rustdesk|org.gnome.FileRoller)$

# --- Media Players ---
windowrulev2 = float,          class:^(imv|mpv)$
windowrulev2 = center,         class:^(imv|mpv)$
windowrulev2 = size 1200 700,  class:^(imv|mpv)$

# --- File Managers ---
windowrulev2 = float,  class:^([Tt]hunar)$, title:^(File Operation Progress)$
windowrulev2 = center, class:^([Tt]hunar)$, title:^(File Operation Progress)$

# --- Picture-in-Picture ---
windowrulev2 = float,                      title:^(Picture-in-Picture)$
windowrulev2 = pin,                        title:^(Picture-in-Picture)$
windowrulev2 = move 100%-w-20 100%-h-20,   title:^(Picture-in-Picture)$


# ┌─── 3. Application-Specific Rules ──────────────────────────────────────────┐

# --- Productivity Tools ---
# Dooit (Todo)
windowrulev2 = float,          class:(floating_todo)
windowrulev2 = size 60% 50%,   class:(floating_todo)
windowrulev2 = center,         class:(floating_todo)

# Clipse (Clipboard)
windowrulev2 = float,          class:(clipse)
windowrulev2 = center,         class:(clipse)
windowrulev2 = stayfocused,    class:(clipse)
windowrulev2 = size 730 686,   class:(clipse)

# --- Terminal Utilities (Kitty) ---
# Maintenance Menu
windowrulev2 = float,          class:^(kitty-maintenance)$
windowrulev2 = size 60% 60%,   class:^(kitty-maintenance)$
windowrulev2 = center,         class:^(kitty-maintenance)$
windowrulev2 = noborder,       class:^(kitty-maintenance)$
windowrulev2 = noshadow,       class:^(kitty-maintenance)$
windowrulev2 = opacity 1.0,    class:^(kitty-maintenance)$

# Updater
windowrulev2 = float,          class:^(kitty-update)$
windowrulev2 = size 50% 60%,   class:^(kitty-update)$
windowrulev2 = center,         class:^(kitty-update)$
windowrulev2 = noborder,       class:^(kitty-update)$
windowrulev2 = noshadow,       class:^(kitty-update)$

# Notifications
windowrulev2 = float,          class:(kitty-notif)
windowrulev2 = size 700 500,   class:(kitty-notif)
windowrulev2 = center,         class:(kitty-notif)

# --- Applications ---
# Dialect
windowrulev2 = float,          class:^(app.drey.Dialect)$
windowrulev2 = center,         class:^(app.drey.Dialect)$
windowrulev2 = size 1000 500,  class:^(app.drey.Dialect)$
windowrulev2 = noshadow,       class:^(app.drey.Dialect)$
windowrulev2 = noblur,         class:^(app.drey.Dialect)$
windowrulev2 = opacity 1 0.85, class:^(app.drey.Dialect)$

# RustDesk
windowrulev2 = float,          class:^(RustDesk)$
windowrulev2 = center,         class:^(RustDesk)$
windowrulev2 = size 1400 900,  class:^(RustDesk)$

# Proton VPN
windowrulev2 = size 500 750,   class:(protonvpn-app)$

# Wofi
windowrulev2 = rounding 0,     class:^(wofi)$
windowrulev2 = noshadow,       class:^(wofi)$
windowrulev2 = noblur,         class:^(wofi)$


# ┌─── 4. Games & Entertainment ───────────────────────────────────────────────┐

# --- Steam ---
windowrulev2 = float,  class:^(steam)$, title:^(Friends List)$
windowrulev2 = center, class:^(steam)$, title:^(Friends List)$

windowrulev2 = float,  class:^(steam)$, title:^(Steam - News)$
windowrulev2 = center, class:^(steam)$, title:^(Steam - News)$

windowrulev2 = float,  class:^(steam)$, title:^(Game Servers)$
windowrulev2 = center, class:^(steam)$, title:^(Game Servers)$

windowrulev2 = float,  class:^(steam)$, title:^(Steam Settings)$
windowrulev2 = center, class:^(steam)$, title:^(Steam Settings)$

windowrulev2 = float,  class:^(steam)$, title:^(Steam - Browser)$
windowrulev2 = center, class:^(steam)$, title:^(Steam - Browser)$

windowrulev2 = float,  class:^(steam)$, title:^(.*\+.*Chats.*|.*Chats$|.*\..*)$
windowrulev2 = center, class:^(steam)$, title:^(.*\+.*Chats.*|.*Chats$|.*\..*)$

# --- Games ---
windowrulev2 = float,      class:^(org.vinegarhq.Sober)$
windowrulev2 = center,     class:^(org.vinegarhq.Sober)$
windowrulev2 = fullscreen, class:^(org.vinegarhq.Sober)$, title:^(Sober)$
windowrulev2 = fullscreen, class:^(org.vinegarhq.Sober)$, title:^(Roblox.*)$


# ┌─── 5. Compatibility Fixes ─────────────────────────────────────────────────┐

# --- Screen Sharing (xwaylandvideobridge) ---
# [CRITICAL] Essential rules to make screen sharing work on Wayland.
windowrulev2 = opacity 0.0 override, class:^(xwaylandvideobridge)$
windowrulev2 = noanim,               class:^(xwaylandvideobridge)$
windowrulev2 = noinitialfocus,       class:^(xwaylandvideobridge)$
windowrulev2 = maxsize 1 1,          class:^(xwaylandvideobridge)$
windowrulev2 = noblur,               class:^(xwaylandvideobridge)$
