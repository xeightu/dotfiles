# ┌────────────────────────────────────────────────────────────────────────────┐
# │                         HYPRLAND - WINDOW RULES                            │
# └────────────────────────────────────────────────────────────────────────────┘
# [INFO] Use 'hyprctl clients' to find window class/title.

# ┌─── 1. General Behavior ────────────────────────────────────────────────────┐

# --- Window Events ---
# [RECOMMENDED] Block manual maximize to preserve tiling logic.
windowrule = suppress_event maximize, match:class .*

# --- Focus Rules ---
# [FIX] Prevent status bar from stealing focus on launch.
windowrule = no_initial_focus on, match:class ^(waybar)$

# ┌─── 2. Floating Windows & UI ───────────────────────────────────────────────┐

# --- Universal Floating Terminals ---
# [NEW] Rules for any app launched with '$floatTerm' (class: float_app)
windowrule = float on, match:class ^(float_app)$
windowrule = center on, match:class ^(float_app)$
windowrule = size 70% 70%, match:class ^(float_app)$
windowrule = dim_around on, match:class ^(float_app)$

# --- System UI & Dialogs ---
# [OPTIMIZATION] Grouped common dialogs
windowrule = float on, match:class ^(pavucontrol|org.kde.polkit-kde.*|lxqt-policykit.*|nwg-look|qt6ct|kvantummanager|hyprland-share-picker|hyprland-dialog|rustdesk|org.gnome.FileRoller)$
windowrule = center on, match:class ^(pavucontrol|org.kde.polkit-kde.*|lxqt-policykit.*|nwg-look|qt6ct|kvantummanager|hyprland-share-picker|hyprland-dialog|rustdesk|org.gnome.FileRoller)$

# --- Media Players ---
windowrule = float on, match:class ^(imv|mpv)$
windowrule = center on, match:class ^(imv|mpv)$
windowrule = size 1200 700, match:class ^(imv|mpv)$

# --- File Managers ---
windowrule = float on, match:class ^([Tt]hunar)$, match:title ^(File Operation Progress|Rename.*)$
windowrule = center on, match:class ^([Tt]hunar)$, match:title ^(File Operation Progress|Rename.*)$

# --- Picture-in-Picture ---
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = move (100%-window_w-20) (100%-window_h-20), match:title ^(Picture-in-Picture)$

# ┌─── 3. Application-Specific Rules ──────────────────────────────────────────┐

# --- Productivity Tools ---
# Dooit (Todo)
windowrule = float on, match:class ^(floating_todo)$
windowrule = size 60% 50%, match:class ^(floating_todo)$
windowrule = center on, match:class ^(floating_todo)$

# Clipse (Clipboard)
windowrule = float on, match:class ^(clipse)$
windowrule = center on, match:class ^(clipse)$
windowrule = stay_focused on, match:class ^(clipse)$
windowrule = size 730 686, match:class ^(clipse)$

# --- Terminal Utilities (Maintenance/Update) ---
windowrule = float on, match:class ^(kitty-maintenance|kitty-update)$
windowrule = center on, match:class ^(kitty-maintenance|kitty-update)$
windowrule = no_shadow on, match:class ^(kitty-maintenance|kitty-update)$
windowrule = match:class ^(kitty-maintenance|kitty-update)$

# Specific sizes
windowrule = size 60% 60%, match:class ^(kitty-maintenance)$
windowrule = size 50% 60%, match:class ^(kitty-update)$
windowrule = opacity 1.0 override, match:class ^(kitty-maintenance)$

# Notifications Log
windowrule = float on, match:class ^(kitty-notif)$
windowrule = size 1000 600, match:class ^(kitty-notif)$
windowrule = center on, match:class ^(kitty-notif)$

# --- Applications ---
# Dialect (Translator)
windowrule = float on, match:class ^(app.drey.Dialect)$
windowrule = center on, match:class ^(app.drey.Dialect)$
windowrule = size 1000 500, match:class ^(app.drey.Dialect)$
windowrule = no_shadow on, match:class ^(app.drey.Dialect)$
windowrule = no_blur on, match:class ^(app.drey.Dialect)$
windowrule = opacity 1 0.85 override, match:class ^(app.drey.Dialect)$

# RustDesk
windowrule = float on, match:class ^(RustDesk)$
windowrule = center on, match:class ^(RustDesk)$
windowrule = size 1400 900, match:class ^(RustDesk)$

# Proton VPN
windowrule = size 500 750, match:class ^(protonvpn-app)$

# Wofi
windowrule = rounding 0, match:class ^(wofi)$
windowrule = no_shadow on, match:class ^(wofi)$
windowrule = no_blur on, match:class ^(wofi)$

# ┌─── 4. Games & Entertainment ───────────────────────────────────────────────┐

# --- Steam ---
windowrule = float on, match:class ^(steam)$, match:title ^(Friends List|Steam - News|Game Servers|Steam Settings|Steam - Browser|.*\+.*Chats.*|.*Chats$|.*\..*)$
windowrule = center on, match:class ^(steam)$, match:title ^(Friends List|Steam - News|Game Servers|Steam Settings|Steam - Browser|.*\+.*Chats.*|.*Chats$|.*\..*)$

# --- Games ---
windowrule = float on, match:class ^(org.vinegarhq.Sober)$
windowrule = center on, match:class ^(org.vinegarhq.Sober)$
windowrule = fullscreen on, match:class ^(org.vinegarhq.Sober)$, match:title ^(Sober|Roblox.*)$

# ┌─── 5. Compatibility Fixes ─────────────────────────────────────────────────┐

# --- Screen Sharing (xwaylandvideobridge) ---
windowrule = opacity 0.0 override, match:class ^(xwaylandvideobridge)$
windowrule = no_anim on, match:class ^(xwaylandvideobridge)$
windowrule = no_initial_focus on, match:class ^(xwaylandvideobridge)$
windowrule = max_size 1 1, match:class ^(xwaylandvideobridge)$
windowrule = no_blur on, match:class ^(xwaylandvideobridge)$

# ┌─── 6. Layer Rules ─────────────────────────────────────────────────────────────┐
layerrule = blur on, ignore_alpha 1, match:namespace ^(waybar)$

