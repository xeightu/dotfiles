# ┌─── 1. General Session Logic ───────────────────────────────────────────────┐

general {
    before_sleep_cmd = loginctl lock-session

    # [FIX] PID-check prevents spawning multiple instances of the locker
    lock_cmd = pidof hyprlock || hyprlock

    after_sleep_cmd = hyprctl dispatch dpms on
}


# ┌─── 2. Inactivity Listeners ────────────────────────────────────────────────┐

# Security Lock (5 minutes)
listener {
    timeout = 300
    on-timeout = ~/.local/bin/desktop/smartlock.sh
}

# Power Management (10 minutes)
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
