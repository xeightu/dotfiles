# ┌─── Hyprland Configuration ─────────────────────────────────────────────────┐
# │  [INFO] Core configuration file for Hyprland Compositor.                   │
# └────────────────────────────────────────────────────────────────────────────┘


# ┌─── Core & Definitions ─────────────────────────────────────────────────────┐

# --- Path Variables ---
$HYPR = ~/.config/hypr

# --- Preferred Applications ---
# [CONFIG] default applications used in keybindings.
$mainMod     = SUPER
$terminal    = kitty
$fileManager = thunar
$menu        = wofi
$browser     = zen-browser

# --- Module Sourcing ---
# [INFO] Modular configuration loading.
source = $HYPR/theme.conf               # Color palette & variables
source = $HYPR/look.conf                # Animations, decoration, blur
source = $HYPR/rules.conf               # Window & Workspace rules
source = $HYPR/keybinds.conf            # Keybindings & Input actions


# ┌─── Hardware & Monitors ────────────────────────────────────────────────────┐

# --- Monitor Layout ---
# [CONFIG] monitor = name, resolution, position, scale
monitor = eDP-1, preferred, auto, 1
monitor = ,      preferred, auto, auto


# ┌─── Autostart & Daemons ────────────────────────────────────────────────────┐

# --- Desktop UI ---
exec-once = waybar                             # Status bar
exec-once = dunst                              # Notifications
exec-once = swww-daemon                        # Wallpaper engine
exec-once = ~/.local/bin/desktop/startup.sh    # Theme applicator

# --- System Services ---
exec-once = lxqt-policykit-agent               # Privilege agent (GUI)
exec-once = clipse -listen                     # Clipboard history
exec-once = xsettingsd                         # GTK settings daemon
exec-once = ~/.local/bin/desktop/idle.sh       # Idle management

# --- Hardware & Input ---
exec-once = gammastep &                        # Eye protection (Night Light)
exec-once = libinput-gestures-setup start      # Touchpad gestures
exec-once = ydotoold                           # Input automation
exec-once = gamemoded -r                       # Feral GameMode


# ┌─── Environment Variables ──────────────────────────────────────────────────┐

# --- Cursor Theme ---
# [CONFIG] Sync cursor between Hyprland and XWayland.
env = HYPRCURSOR_THEME, catppuccin-mocha-light-cursors
env = HYPRCURSOR_SIZE,  24
env = XCURSOR_THEME,    catppuccin-mocha-light-cursors
env = XCURSOR_SIZE,     24

# --- Toolkit Backend ---
# [INFO] Force applications to use Wayland.
env = GDK_BACKEND,          wayland,x11
env = QT_QPA_PLATFORM,      wayland
env = XDG_SESSION_TYPE,     wayland
env = MOZ_ENABLE_WAYLAND,   1

# --- Theming ---
env = GTK_THEME,            catppuccin-mocha-lavender-standard+default
env = QT_QPA_PLATFORMTHEME, qt6ct

# --- NVIDIA Proprietary ---
# [CRITICAL] Essential fixes for NVIDIA drivers on Wayland.
env = LIBVA_DRIVER_NAME,         nvidia
env = GBM_BACKEND,               nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = WLR_NO_HARDWARE_CURSORS,   1             # [FIX] Fixes invisible cursor


# ┌─── Input Configuration ────────────────────────────────────────────────────┐

# --- Keyboard ---
input {
    kb_layout    = us,ru
    kb_options   = grp:alt_shift_toggle
    
    repeat_rate  = 50
    repeat_delay = 200
}

# --- Mouse & Touchpad ---
input {
    follow_mouse = 1

    touchpad {
        natural_scroll          = false
        middle_button_emulation = true
        scroll_factor           = 1
    }
}
