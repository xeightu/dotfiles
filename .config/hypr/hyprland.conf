# ┌─── 1. Core Definitions & Imports ──────────────────────────────────────────┐

$HYPR = ~/.config/hypr

# [NOTE] Loading colors first to define palette variables for subsequent modules
source = $HYPR/colors.conf
source = $HYPR/decoration.conf
source = $HYPR/keybinds.conf
source = $HYPR/rules.conf


# ┌─── 2. Monitors & Display ──────────────────────────────────────────────────┐

# Primary display
monitor = eDP-1, preferred, auto, 1

# Default fallback for external screens
monitor = , preferred, auto, auto


# ┌─── 3. Autostart & Background Services ─────────────────────────────────────┐

# Desktop UI
exec-once = waybar
exec-once = mako
exec-once = swww-daemon
# [NOTE] Restore the last active theme state on startup
exec-once = ~/.local/bin/desktop/startup.sh

# System Services
# [WARN] Essential for GUI authentication prompts
exec-once = systemctl --user start hyprpolkitagent
# [NOTE] wl-clip-persist prevents clipboard loss when the source application closes
exec-once = wl-clip-persist --clipboard regular
exec-once = wl-clip-persist --clipboard primary
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# [FIX] xsettingsd provides legacy GTK compatibility settings
exec-once = xsettingsd
exec-once = hypridle

# Hardware & Input Services
exec-once = gammastep
exec-once = libinput-gestures-setup start
exec-once = ydotoold
exec-once = gamemoded -r


# ┌─── 4. Environment Variables ───────────────────────────────────────────────┐

# Cursor Styling
env = HYPRCURSOR_THEME, catppuccin-mocha-light-cursors
env = HYPRCURSOR_SIZE,  24
env = XCURSOR_THEME,    catppuccin-mocha-light-cursors
env = XCURSOR_SIZE,     24

# Toolkit Backends
# [FIX] Multi-backend definition ensures X11 fallback if Wayland negotiation fails
env = GDK_BACKEND,        wayland,x11
env = QT_QPA_PLATFORM,    wayland
env = XDG_SESSION_TYPE,   wayland
env = MOZ_ENABLE_WAYLAND, 1

# Visual Theming
env = GTK_THEME,            catppuccin-mocha-lavender-standard+default
env = QT_QPA_PLATFORMTHEME, qt6ct

# NVIDIA Patches
# [NOTE] Mandatory flags for buffer stability on NVIDIA + Wayland
env = LIBVA_DRIVER_NAME,         nvidia
env = GBM_BACKEND,               nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
# [FIX] Prevents invisible cursor issue on some NVIDIA cards
env = WLR_NO_HARDWARE_CURSORS,   1


# ┌─── 5. Input Configuration ─────────────────────────────────────────────────┐

input {
    kb_layout  = us,ru
    kb_options = grp:alt_shift_toggle
    
    # [NOTE] Aggressive repeat rates for high-speed terminal navigation
    repeat_rate  = 50
    repeat_delay = 200

    follow_mouse = 1

    touchpad {
        natural_scroll          = false
        middle_button_emulation = true
        scroll_factor           = 1
    }
}
