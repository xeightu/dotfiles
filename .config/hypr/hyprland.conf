# ┌─── Hyprland Configuration ─────────────────────────────────────────────────┐
# │  [INFO] Core layout and logic for the Hyprland Compositor.
# └────────────────────────────────────────────────────────────────────────────┘


# ┌─── 1. Core Definitions & Imports ──────────────────────────────────────────┐

# [CFG] Global path variable for modularity
$HYPR = ~/.config/hypr

# [FLOW] Sequential loading of modules
# [CRIT] colors.conf must load first to define variables for other modules
source = $HYPR/colors.conf              # [CFG] Color palette
source = $HYPR/decoration.conf          # [CFG] Visual styling & effects
source = $HYPR/keybinds.conf            # [FLOW] Input mapping
source = $HYPR/rules.conf               # [CFG] Window management


# ┌─── 2. Hardware & Monitors ─────────────────────────────────────────────────┐

# [CFG] Primary display configuration
# [OPT] Using 'preferred' for safe native resolution negotiation
monitor = eDP-1, preferred, auto, 1

# [OPT] Default fallback for external screens
monitor = ,      preferred, auto, auto


# ┌─── 3. Autostart & Background Services ─────────────────────────────────────┐

# --- Desktop UI ---
exec-once = waybar                                    # [FLOW] Main status bar
exec-once = dunst                                     # [FLOW] Notification daemon
exec-once = swww-daemon                               # [FLOW] Wallpaper engine
exec-once = ~/.local/bin/desktop/startup.sh           # [HACK] Syncs GTK/System themes

# --- System Services ---
exec-once = systemctl --user start hyprpolkitagent    # [CRIT] Essential GUI auth agent
exec-once = clipse -listen                            # [FLOW] Clipboard state tracking
exec-once = xsettingsd                                # [FIX] Legacy GTK compatibility
exec-once = hypridle                                  # [OPT] Power management
exec-once = kitty --class startup_todo -e ~/.local/bin/boot_tasks.sh

# --- Hardware & Input ---
exec-once = gammastep                                 # [OPT] Blue light filter
exec-once = libinput-gestures-setup start             # [FLOW] Gesture interpreter
exec-once = ydotoold                                  # [FLOW] Input automation service
exec-once = gamemoded -r                              # [OPT] Resource prioritization


# ┌─── 4. Environment Variables ───────────────────────────────────────────────┐

# [CFG] Cursor styling (Synced for Hyprland and XWayland)
env = HYPRCURSOR_THEME, catppuccin-mocha-light-cursors
env = HYPRCURSOR_SIZE,  24
env = XCURSOR_THEME,    catppuccin-mocha-light-cursors
env = XCURSOR_SIZE,     24

# [CFG] Toolkits backend selection
# [FIX] Multi-backend flag to ensure fallback to X11 if Wayland fails
env = GDK_BACKEND,          wayland,x11
env = QT_QPA_PLATFORM,      wayland
env = XDG_SESSION_TYPE,     wayland
env = MOZ_ENABLE_WAYLAND,   1

# [CFG] Visual theming variables
env = GTK_THEME,            catppuccin-mocha-lavender-standard+default
env = QT_QPA_PLATFORMTHEME, qt6ct

# [CRIT] NVIDIA Driver Patches
# Essential flags to prevent buffer corruption and flickering on NVIDIA + Wayland
env = LIBVA_DRIVER_NAME,         nvidia
env = GBM_BACKEND,               nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = WLR_NO_HARDWARE_CURSORS,   1             # [FIX] Resolves invisible cursor issue


# ┌─── 5. Input Configuration ─────────────────────────────────────────────────┐

# --- Keyboard ---
input {
    # [CFG] Layout switching logic
    kb_layout    = us,ru
    kb_options   = grp:alt_shift_toggle
    
    # [OPT] Enhanced repeat rate for faster terminal navigation
    repeat_rate  = 50
    repeat_delay = 200
}

# --- Mouse & Touchpad ---
input {
    # [CFG] Window focus follows mouse movement
    follow_mouse = 1

    touchpad {
        # [CFG] Interaction preferences
        natural_scroll          = false
        middle_button_emulation = true
        scroll_factor           = 1
    }
}
