# ┌─── 1. General Layout ──────────────────────────────────────────────────────┐

general {
    # Spatial gaps for visual breathing room
    gaps_in  = 6
    gaps_out = 15

    border_size = 2

    # Lavender/Blue gradient border
    col.active_border   = $lavender $blue 45deg
    col.inactive_border = $surface1
    
    layout = dwindle
}


# ┌─── 2. Decoration & Effects ────────────────────────────────────────────────┐

decoration {
    rounding = 10

    # Hardware-accelerated background blur
    blur {
        enabled = true
        size    = 5
        passes  = 1
    }

    # Window separation shadows
    shadow {
        enabled      = true
        range        = 10
        render_power = 3
        # [NOTE] Using Mocha Crust (11111B) with 50% alpha for soft depth
        color        = rgba(11111B88)
    }
}


# ┌─── 3. Animations ──────────────────────────────────────────────────────────┐

animations {
    enabled = yes

    # Custom ease-out curve for snappy feedback
    bezier = fastOut, 0.1, 1.05, 0.1, 1

    # [NOTE] Popin at speed 4 creates an almost instant response feel
    animation = windowsIn, 1, 4, fastOut, popin 80%
    animation = windowsOut, 1, 4, fastOut, popin 80%
    animation = windowsMove, 1, 4, fastOut

    # Slower fade to soften UI transitions
    animation = fadeIn, 1, 5, fastOut
    animation = fadeOut, 1, 5, fastOut
    
    animation = workspaces, 1, 5, fastOut, slide
    animation = specialWorkspace, 1, 5, fastOut, slide
}


# ┌─── 4. Layout Specifics ────────────────────────────────────────────────────┐

dwindle {
    pseudotile     = true
    preserve_split = true
}

group {
    col.border_active   = $lavender
    col.border_inactive = $surface1

    groupbar {
        height          = 25
        render_titles   = true
        gradients       = false
        
        font_family     = "JetBrainsMono Nerd Font"
        font_size       = 10
        
        col.active      = $lavender $blue 45deg
        col.inactive    = $surface1
        text_color      = $text
    }
}


# ┌─── 5. System Overrides ────────────────────────────────────────────────────┐

misc {
    # Clean boot: disable default wallpaper and splash logo
    force_default_wallpaper = 0
    disable_hyprland_logo   = true
}

xwayland {
    # [FIX] Prevent blurry text on non-standard scaling for legacy apps
    force_zero_scaling = true
}
