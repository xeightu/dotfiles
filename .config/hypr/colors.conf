# ┌─── Catppuccin Mocha Palette ───────────────────────────────────────────────┐

# ┌─── 1. Main Accents ────────────────────────────────────────────────────────┐

# Vibrant colors for active states and primary highlights
$mauve     = rgba(cba6f7ff)
$red       = rgba(f38ba8ff)
$green     = rgba(a6e3a1ff)
$yellow    = rgba(f9e2afff)
$blue      = rgba(89b4faff)
$peach     = rgba(fab387ff)
$teal      = rgba(94e2d5ff)


# ┌─── 2. Secondary Accents ───────────────────────────────────────────────────┐

# Subtler tones for variations and gradients
$rosewater = rgba(f5e0dcff)
$flamingo  = rgba(f2cdcdff)
$pink      = rgba(f5c2e7ff)
$maroon    = rgba(eba0acff)
$sky       = rgba(89dcebff)
$sapphire  = rgba(74c7ecff)
$lavender  = rgba(b4befeff)


# ┌─── 3. Typography & UI Neutrals ────────────────────────────────────────────┐

# Text hierarchy and overlay elements
$text      = rgba(cdd6f4ff)
$subtext1  = rgba(bac2deff)
$subtext0  = rgba(a6adc8ff)

# Interactive states (Inactive borders, separators)
$overlay2  = rgba(9399b2ff)
$overlay1  = rgba(7f849cff)
$overlay0  = rgba(6c7086ff)


# ┌─── 4. Surface & Backgrounds ───────────────────────────────────────────────┐

# UI Depth layers for windows, tooltips, and bars
$surface2  = rgba(585b70ff)
$surface1  = rgba(45475aff)
$surface0  = rgba(313244ff)

# Base background layers
$base      = rgba(1e1e2eff)
$mantle    = rgba(181825ff)
$crust     = rgba(11111bff)
