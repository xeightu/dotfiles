# ┌─── 1. General Settings ────────────────────────────────────────────────────┐

general {
    hide_cursor = true
}


# ┌─── 2. Background ──────────────────────────────────────────────────────────┐

background {
    path = ~/Pictures/walls/sushi.png
    
    # [NOTE] Visual effects configuration for high-readability blur
    blur_passes       = 3
    blur_size         = 7
    noise             = 0.0117
    contrast          = 0.8916
    brightness        = 0.8172
    vibrancy          = 0.1696
    vibrancy_darkness = 0.0
}


# ┌─── 3. Top Status Row ──────────────────────────────────────────────────────┐

# Network Status
label {
    text        = cmd[update:5000] ~/.local/bin/modules/network.sh
    color       = rgba(cdd6f4ff)
    font_size   = 16
    font_family = JetBrains Mono Nerd Font
    
    position    = 30, -30
    halign      = left
    valign      = top
}

# Battery Status
label {
    text        = cmd[update:5000] ~/.local/bin/modules/battery.sh
    color       = rgba(cdd6f4ff)
    font_size   = 16
    font_family = JetBrains Mono Nerd Font
    
    position    = -30, -30
    halign      = right
    valign      = top
}


# ┌─── 4. Main UI Column ──────────────────────────────────────────────────────┐

# [NOTE] Time-aware greeting logic (Morning/Afternoon/Evening)
label {
    text         = cmd[update:60000] GREETING=$(case $(date +%H) in 0[5-9]|1[01]) echo "Good morning,";; 1[2-7]) echo "Good afternoon,";; *) echo "Good evening,";; esac); echo "$GREETING $USER"
    color        = rgba(bac2deff)
    font_size    = 20
    font_family  = JetBrains Mono Nerd Font
    
    position     = 0, -280
    halign       = center
    valign       = center
}

# User Avatar
image {
    path         = ~/Pictures/PFP's/x8u.png
    size         = 120
    border_size  = 3
    border_color = rgba(b4befeff)
    
    position     = 0, -180
    halign       = center
    valign       = center
}

# Authentication Input
input-field {
    size              = 280, 55
    position          = 0, -60
    halign            = center
    valign            = center

    outline_thickness = 2
    dots_size         = 0.25
    dots_spacing      = 0.2
    dots_center       = true
    outer_color       = rgba(b4befeff)
    inner_color       = rgba(303042ff)
    font_color        = rgba(cdd6f4ff)
    rounding          = 15
    
    fade_on_empty     = true
    placeholder_text  = <i>Password...</i>
    hide_input        = false
    
    # [NOTE] Red alert color for failed attempts
    fail_color        = rgba(f38ba8ff)
    fail_text         = <i>$FAIL</i>
}

# Main Clock
label {
    text          = cmd[update:1000] echo "$(date +"%R")"
    color         = rgba(cdd6f4ff)
    font_size     = 100
    font_family   = JetBrains Mono Nerd Font Bold
    
    position      = 0, 50
    halign        = center
    valign        = center
}

# Media Info
label {
    text          = cmd[update:1000] ~/.local/bin/modules/media.sh
    color         = rgba(cdd6f4ff)
    font_size     = 18
    font_family   = JetBrains Mono Nerd Font
    
    position      = 0, 150
    halign        = center
    valign        = center
}


# ┌─── 5. Footer HUD ──────────────────────────────────────────────────────────┐

# System Uptime
label {
    text          = cmd[update:1000] echo "  $(uptime -p | sed -e 's/up //')"
    color         = rgba(74c7ecff)
    font_size     = 16
    font_family   = JetBrains Mono Nerd Font
    
    position      = 30, 30
    halign        = left
    valign        = bottom
}

# Status Indicator
label {
    text          =  Locked
    color         = rgba(cdd6f4ff)
    font_size     = 16
    font_family   = JetBrains Mono Nerd Font
    
    position      = 0, 20
    halign        = center
    valign        = bottom
}

# [WARN] Vital widget: essential for verifying active layout before password entry
label {
    text          = cmd[update:500] echo "  $(~/.local/bin/modules/get-layout.sh)"
    color         = rgba(a6e3a1ff)
    font_size     = 20
    font_family   = JetBrains Mono Nerd Font
    
    position      = -30, 30
    halign        = right
    valign        = bottom
}
