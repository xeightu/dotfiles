# ┌─── Uair Configuration ─────────────────────────────────────────────────────┐

[defaults]
# [OPTIMIZATION] Output JSON for Waybar dynamic styling
format = "{ \"text\": \"{name}  {time}\", \"class\": \"{id}\" }\n"
time_format = "%M:%S"


# --- Cycle 1 ------------------------------------------------------------------

[[sessions]]
id       = "work1"
duration = "25m"
name     = "󰄉"
command  = "notify-send -u critical -i clock 'Focus Complete' 'Take 5 minutes.'"

[[sessions]]
id       = "rest1"
duration = "5m"
name     = "󰅶"
command  = "notify-send -u normal -i coffee 'Break Over' 'Back to work.'"


# --- Cycle 2 ------------------------------------------------------------------

[[sessions]]
id       = "work2"
duration = "25m"
name     = "󰄉"
command  = "notify-send -u critical -i clock 'Focus Complete' 'Take 5 minutes.'"

[[sessions]]
id       = "rest2"
duration = "5m"
name     = "󰅶"
command  = "notify-send -u normal -i coffee 'Break Over' 'Back to work.'"


# --- Cycle 3 ------------------------------------------------------------------

[[sessions]]
id       = "work3"
duration = "25m"
name     = "󰄉"
command  = "notify-send -u critical -i clock 'Focus Complete' 'Take 5 minutes.'"

[[sessions]]
id       = "rest3"
duration = "5m"
name     = "󰅶"
command  = "notify-send -u normal -i coffee 'Break Over' 'Back to work.'"


# --- Cycle 4 (Final) ----------------------------------------------------------

[[sessions]]
id       = "work4"
duration = "25m"
name     = "󰄉"
command  = "notify-send -u critical -i clock 'Cycle Complete' 'Earned a Long Break.'"


# --- Long Break ---------------------------------------------------------------

[[sessions]]
# [INFO] Standard Pomodoro long break (15-30m)
id       = "long_rest"
duration = "20m"
name     = "󰤁"
command  = "notify-send -u critical -i software-update-available 'Long Break Over' 'Starting new cycle.'"
