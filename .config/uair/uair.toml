# ┌─── 1. Interface & Output ──────────────────────────────────────────────────┐

[defaults]
# [NOTE] JSON format is required for dynamic CSS class switching in Waybar
format = "{ \"text\": \"{name}  {time}\", \"class\": \"{id}\" }\n"
time_format = "%M:%S"


# ┌─── 2. Standard Pomodoro Cycles ────────────────────────────────────────────┐

# Cycle 1
[[sessions]]
id       = "work1"
duration = "25m"
name     = "󰄉"
command  = "notify-send -u critical -i clock 'Focus Complete' 'Take 5 minutes.'"

[[sessions]]
id       = "rest1"
duration = "5m"
name     = "󰅶"
command  = "notify-send -u normal -i coffee 'Break Over' 'Back to work.'"

# Cycle 2
[[sessions]]
id       = "work2"
duration = "25m"
name     = "󰄉"
command  = "notify-send -u critical -i clock 'Focus Complete' 'Take 5 minutes.'"

[[sessions]]
id       = "rest2"
duration = "5m"
name     = "󰅶"
command  = "notify-send -u normal -i coffee 'Break Over' 'Back to work.'"

# Cycle 3
[[sessions]]
id       = "work3"
duration = "25m"
name     = "󰄉"
command  = "notify-send -u critical -i clock 'Focus Complete' 'Take 5 minutes.'"

[[sessions]]
id       = "rest3"
duration = "5m"
name     = "󰅶"
command  = "notify-send -u normal -i coffee 'Break Over' 'Back to work.'"

# Cycle 4 (Final Stretch)
[[sessions]]
id       = "work4"
duration = "25m"
name     = "󰄉"
command  = "notify-send -u critical -i clock 'Cycle Complete' 'Earned a Long Break.'"


# ┌─── 3. Extended Rest ───────────────────────────────────────────────────────┐

[[sessions]]
# [NOTE] Recharging phase after completing a full set (4 focus sessions)
id       = "long_rest"
duration = "20m"
name     = "󰤁"
command  = "notify-send -u critical -i software-update-available 'Long Break Over' 'Starting new cycle.'"
