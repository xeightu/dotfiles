git:
  # ┌─── 1. Diff Rendering ────────────────────────────────────────────────────┐

  pagers:
    # [NOTE] Use 'delta' for high-readability syntax-highlighted diffs
    # [FIX] --paging=never is required for Lazygit to handle internal scrolling
    - colorArg: always
      pager: delta --paging=never
