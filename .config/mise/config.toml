# ┌────────────────────────────────────────────────────────────────────────────┐
# │                        Mise Configuration (Global)                         │
# └────────────────────────────────────────────────────────────────────────────┘

[tools]
# [CONFIG] Глобальные версии по умолчанию.
# Если в папке проекта не задано иное, будут использоваться эти.
python = "3.14"      # Твой выбор (Latest Stable в дек 2025)
node = "lts"         # Long Term Support (стабильная, сейчас v22/v24)
# go = "latest"      # Можно раскомментировать, если понадобится
# rust = "latest"    # Mise отлично работает и с Rust

[settings]
# [INFO] Включаем экспериментальные фичи (нужно для замены direnv и таск-раннера)
experimental = true

# [COMPATIBILITY] Читать конфиги других менеджеров (.nvmrc, .python-version, .tool-versions)
# Это позволяет работать с проектами, созданными пользователями asdf/nvm/pyenv.
legacy_version_file = true

# [BEHAVIOR] Не спрашивать подтверждение при установке новых версий (mise install)
yes = true

# [PERFORMANCE] Количество потоков для компиляции (если mise собирает python из исходников)
jobs = 4

# [PYTHON] Устанавливать эти пакеты автоматически для каждой новой версии Python
# Полезно, чтобы pip всегда был свежим.
# python_default_packages_file = "~/.config/mise/default-python-packages"
