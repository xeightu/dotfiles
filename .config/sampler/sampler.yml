variables:
    latency: ping -c 1 8.8.8.8 | grep 'time=' | awk -F 'time=' '{print $2}' | awk
        '{print $1}' | cut -d. -f1
runcharts:
  - title: Latency to Prod (ms)
    position: [[0, 1], [39, 32]]
    rate-ms: 1000
    legend:
        enabled: true
        details: false
    scale: 2
    items:
      - label: AWS/Prod
        color: 2
        sample: ping -c 1 8.8.8.8 | grep 'time=' | awk -F 'time=' '{print $2}' | awk
            '{print $1}'
      - label: Local Gateway
        color: 4
        sample: ping -c 1 192.168.1.1 | grep 'time=' | awk -F 'time=' '{print $2}'
            | awk '{print $1}'
  - title: Errors in Log (Last 1m)
    position: [[41, 1], [39, 32]]
    rate-ms: 2000
    items:
      - label: Nginx 500s
        color: 1
        sample: tail -n 100 /var/log/syslog | grep -i 'error' | wc -l
sparklines:
  - title: TODOs in Project
    position: [[41, 37], [39, 4]]
    rate-ms: 10000
    sample: grep -r 'TODO' . 2>/dev/null | wc -l
  - title: Active DB Conns
    position: [[41, 33], [39, 3]]
    rate-ms: 2000
    sample: ss -antp | grep ':5432' | grep 'ESTAB' | wc -l
textboxes:
  - title: Infrastructure Health
    position: [[0, 33], [39, 8]]
    rate-ms: 5000
    sample: "echo \"Redis:   $(docker ps | grep redis > /dev/null && echo '\U0001F7E2
        UP' || echo '\U0001F534 DOWN')\"\necho \"Postgres:$(docker ps | grep postgres
        > /dev/null && echo '\U0001F7E2 UP' || echo '\U0001F534 DOWN')\"\necho \"Nginx:
        \  $(systemctl is-active nginx > /dev/null 2>&1 && echo '\U0001F7E2 UP' ||
        echo '\U0001F534 DOWN')\"\n"
