# ┌─── Kitty Terminal Configuration ───────────────────────────────────────────┐
# │  [INFO] Core terminal emulator settings and performance tuning.
# └────────────────────────────────────────────────────────────────────────────┘


# ┌─── 1. Theme & Meta ────────────────────────────────────────────────────────┐


# [CFG] Decouple color logic from functional logic for easier theme swapping
include colors.conf


# ┌─── 2. Typography & Rendering ──────────────────────────────────────────────┐


# [CFG] High-density font for development with integrated glyph support
font_family      JetBrainsMono Nerd Font Mono
font_size        14.0

# [OPT] Automatic weight detection based on font metadata
bold_font        auto
italic_font      auto
bold_italic_font auto


# ┌─── 3. Visuals & Decoration ────────────────────────────────────────────────┐


# [CFG] Static block cursor for clear focus position in terminal and editors
cursor_shape     block
cursor_blink_interval 0.5

# [OPT] Motion trailing for improved eye tracking during fast scrolling
cursor_trail     1

# [CFG] Internal margins to prevent text-to-border clipping
window_padding_width 10


# ┌─── 4. Performance Tuning ──────────────────────────────────────────────────┐


# [OPT] Minimize input-to-render latency (Requires strong GPU)
input_delay      0
repaint_delay    2

# [HACK] Bypass V-Sync to eliminate frame-buffer queuing lag
# [CRIT] May cause screen tearing on some displays
sync_to_monitor  no


# ┌─── 5. Scrollback & Pager Logic ────────────────────────────────────────────┐


# [CFG] Balanced history buffer for log analysis without excessive RAM usage
scrollback_lines 10000
wheel_scroll_multiplier 3.0

# [HACK] Volatile pipe into Neovim to treat terminal history as a text buffer
# [FIX] Force terminal mode and write to /tmp to prevent buffer lockups
scrollback_pager nvim -c "set ft=man nonumber nolist showtabline=0 foldcolumn=0 laststatus=0" -c "autocmd TermOpen * startinsert" -c "silent write! /tmp/kitty_scrollback_buffer | te cat /tmp/kitty_scrollback_buffer - "


# ┌─── 6. System Integration ──────────────────────────────────────────────────┐


# [CRIT] Enable remote procedure calls for external scripts (e.g., Pyre)
allow_remote_control yes
listen_on        unix:@mykitty

# [FLOW] Streamline UX by removing intrusive alerts and confirmation prompts
enable_audio_bell no
confirm_os_window_close 0


# ┌─── 7. Keybindings & Action Flow ───────────────────────────────────────────┐


# --- Clipboard ---
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# --- Font Resizing ---
# [OPT] Dynamic scaling for presentations or high-res display switching
map ctrl+shift+equal change_font_size all +2.0
map ctrl+shift+plus  change_font_size all +2.0
map ctrl+shift+minus change_font_size all -2.0
map ctrl+shift+backspace change_font_size all 0

# --- Advanced Kittens (Data Extraction) ---

# [FLOW] Regex-based URL harvesting and browser hand-off
map ctrl+shift+p kitten hints --type url

# [FLOW] File path detection for rapid command-line argument injection
map ctrl+shift+f kitten hints --type path --program -

# [OPT] Quick-access for Unicode/Emoji and File Diffs
map ctrl+shift+u kitten unicode_input
map ctrl+shift+d kitten diff

# --- The Pager Trigger ---
# [FLOW] Invoke the Neovim HACK defined in Section 5
map ctrl+shift+h show_scrollback
