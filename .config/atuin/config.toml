# ┌─── 1. Data Storage & Synchronization ──────────────────────────────────────┐

# Explicit paths to ensure portability across different environments
db_path      = "~/.local/share/atuin/history.db"
key_path     = "~/.local/share/atuin/key"
session_path = "~/.local/share/atuin/session"

dialect  = "us"
timezone = "local"

auto_sync    = true
update_check = true
sync_frequency = "5m" # Balance between battery and parity


# ┌─── 2. Interface Topology ──────────────────────────────────────────────────┐

style = "auto"

# [NOTE] 0 = full screen. Forces total context takeover for better focus
inline_height = 0

show_preview = true
show_help    = true
show_tabs    = false


# ┌─── 3. Search & Workflow Logic ─────────────────────────────────────────────┐

# [NOTE] Fuzzy algorithm allows approximate matching (e.g., 'dcr' -> 'docker run')
search_mode = "fuzzy"

# Search history across all registered machines and sessions
filter_mode = "global"

# [NOTE] 'return-query' puts command in buffer for editing instead of execution
exit_mode = "return-query"

# Prioritize commands from the current git repository
workspaces = true


# ┌─── 4. Interaction & Safety ────────────────────────────────────────────────┐

# [WARN] Immediate execution risk. High risk of accidental 'rm' or 'dd' if true
enter_accept = true

word_jump_mode       = "emacs"
scroll_context_lines = 2


# ┌─── 5. Statistics & Exclusions ─────────────────────────────────────────────┐

[stats]
# [NOTE] Strip 'sudo/doas' to group identical commands in analytical data
common_prefix = ["sudo", "doas"]

# Filter trivial shell internal commands from history analysis
ignored_commands = ["cd", "ls", "clear", "exit"]


# ┌─── 6. Preview Strategy ────────────────────────────────────────────────────┐

[preview]
# Adaptive height calculation based on command length vs terminal area
strategy = "auto"


# ┌─── 7. Keybindings ─────────────────────────────────────────────────────────┐

[keys]
# [NOTE] False keeps focus inside Atuin to prevent accidental shell exits
scroll_exits = false
