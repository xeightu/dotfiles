# ┌───── Showcase Layout ──────────────────────────────────────────────────────┐

# Center panel — Fastfetch system overview
windowrule = float on, size (monitor_w*0.55) (monitor_h*0.5), move ((monitor_w*0.225)) ((monitor_h*0.25)), match:title ^(fastfetch)$

# Top status — terminal clock
windowrule = float on, size (monitor_w*0.55) (monitor_h*0.18), move ((monitor_w*0.225)) ((monitor_h*0.05)), match:initial_title ^(tty-clock)$

# Bottom panel — audio visualizer
windowrule = float on, size (monitor_w*0.98) (monitor_h*0.22), move ((monitor_w*0.01)) ((monitor_h*0.77)), match:initial_title ^(cava)$

# Left side — matrix animation
windowrule = float on, size (monitor_w*0.2) (monitor_h*0.7), move ((monitor_w*0.01)) ((monitor_h*0.05)), match:initial_title ^(unimatrix)$

# Right side — pipes animation
windowrule = float on, size (monitor_w*0.2) (monitor_h*0.7), move ((monitor_w*0.79)) ((monitor_h*0.05)), match:initial_title ^(pipes)$
