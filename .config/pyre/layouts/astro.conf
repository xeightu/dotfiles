# ┌───── Starship Bridge Layout ───────────────────────────────────────────────┐

# Main viewport — Astroterm central terminal
windowrule = float on, size (monitor_w*0.6) (monitor_h*0.7), move ((monitor_w*0.2)) ((monitor_h*0.15)), match:title ^(astro_main)$

# Ship clock — top-left status display
windowrule = float on, size (monitor_w*0.18) (monitor_h*0.15), move ((monitor_w*0.01)) ((monitor_h*0.15)), match:title ^(astro_clock)$

# Sensors panel — audio visualizer
windowrule = float on, size (monitor_w*0.18) (monitor_h*0.53), move ((monitor_w*0.01)) ((monitor_h*0.32)), match:title ^(astro_vis)$

# System monitor — resource telemetry
windowrule = float on, size (monitor_w*0.18) (monitor_h*0.7), move ((monitor_w*0.81)) ((monitor_h*0.15)), match:title ^(astro_sys)$
